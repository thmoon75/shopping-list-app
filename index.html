<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #5a67d8; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      background: white;
      color: #718096;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    #list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      transition: all 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { border-color: #c3dafe; background: #f7faff; }

    .item.done {
      background: #f7faff;
      border-color: #c3dafe;
      opacity: 0.7;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: all 0.2s;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .summary {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.83rem;
      color: #718096;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.83rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { color: #cbd5e0; cursor: default; background: none; }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들을 적어보세요</p>

    <div class="input-row">
      <input type="text" id="input" placeholder="아이템 입력..." maxlength="60">
      <button onclick="addItem()" title="추가">+</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="list"></ul>
    <div id="empty" class="empty" style="display:none">아이템이 없습니다</div>
    <div id="loading" class="loading">불러오는 중...</div>

    <div class="summary">
      <span id="counter">0개 중 0개 완료</span>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ocnskksoaazogpkejyus.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jbnNra3NvYWF6b2dwa2VqeXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTEzOTYsImV4cCI6MjA5MDk2NzM5Nn0.0OrKPeglqCKasAK8xczu_y6ly9jX3SU-iSyvab3Oitg';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let filter = 'all';

    const input = document.getElementById('input');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        console.error('불러오기 실패:', error);
        return;
      }
      items = data;
      render();
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;

      const newItem = { id: Date.now(), text, done: false };
      const { data, error } = await supabase
        .from('shopping_items')
        .insert(newItem)
        .select()
        .single();

      if (error) { console.error('추가 실패:', error); return; }
      items.push(data);
      input.value = '';
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await supabase
        .from('shopping_items')
        .update({ done: !item.done })
        .eq('id', id);

      if (error) { console.error('수정 실패:', error); return; }
      item.done = !item.done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { console.error('삭제 실패:', error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { console.error('삭제 실패:', error); return; }
      items = items.filter(i => !i.done);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const counter = document.getElementById('counter');
      const clearBtn = document.getElementById('clearBtn');

      const visible = items.filter(i =>
        filter === 'all' ? true :
        filter === 'done' ? i.done : !i.done
      );

      list.innerHTML = '';
      visible.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');
        li.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''}
            onchange="toggleItem(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });

      empty.style.display = visible.length === 0 ? 'block' : 'none';

      const done = items.filter(i => i.done).length;
      counter.textContent = `${items.length}개 중 ${done}개 완료`;
      clearBtn.disabled = done === 0;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadItems();
  </script>
</body>
</html>
